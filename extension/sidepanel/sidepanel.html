<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gmail Sorter</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="paper" aria-hidden="true"></div>

    <header class="masthead">
      <div class="eyebrow">The Inbox Gazette</div>
      <h1 class="title">Gmail Sorter</h1>
      <div class="rule"></div>
    </header>

    <main class="content">
      <section class="banner banner--error" id="cors-banner" hidden>
        <div class="banner__title" id="cors-title">Can&rsquo;t reach Ollama</div>
        <p class="banner__body" id="cors-body">
          Start Ollama with origins allowed for this extension:
        </p>
        <code class="banner__code" id="cors-code">OLLAMA_ORIGINS=chrome-extension://* ollama serve</code>
        <button class="banner__copy" type="button" data-copy-target="cors-code">Copy</button>
      </section>

      <section class="toasts" id="toasts" aria-live="polite" aria-atomic="false"></section>

      <div class="dry-run-pill" id="dry-run-pill" hidden>
        <span>Dry run</span>
        <span class="dry-run-pill__hint">No Gmail mutations</span>
      </div>

      <section class="primary-action">
        <button class="btn btn--secondary" id="fetch-btn" type="button">
          <span class="btn__label">Fetch inbox</span>
        </button>
        <button class="btn btn--primary" id="classify-btn" type="button">
          <span class="btn__label">Classify inbox</span>
          <span class="btn__count" id="classify-count" hidden></span>
        </button>
        <div class="progress" id="progress" hidden>
          <div class="progress__bar" id="progress-bar"></div>
        </div>
      </section>

      <section class="emails" aria-label="Inbox">
        <div class="section-head">
          <span class="section-head__label">Inbox</span>
          <span class="section-head__count" id="email-count">0</span>
        </div>

        <ul class="email-list" id="email-list"></ul>

        <p class="empty-state" id="empty-state" hidden>
          Your inbox is empty. Press <em>Fetch inbox</em> above to pull new mail.
        </p>
      </section>
    </main>

    <footer class="footer">
      <button class="btn btn--secondary" id="apply-all-btn" type="button" hidden>
        <span class="btn__label">Apply all</span>
        <span class="btn__count" id="apply-count" hidden></span>
      </button>
      <a class="footer__link" id="options-link" href="#">Settings &rsaquo;</a>
      <div class="dev-tools" id="dev-tools" hidden>
        <button class="dev-btn" id="dev-auth-btn" type="button">Test auth</button>
        <button class="dev-btn" id="dev-fetch-btn" type="button">Fetch inbox</button>
        <button class="dev-btn" id="dev-classify-btn" type="button">Classify one</button>
        <button class="dev-btn" id="dev-superstar-btn" type="button">Probe &#9733;</button>
        <span class="dev-result" id="dev-result"></span>
      </div>
    </footer>

    <template id="email-row-template">
      <li class="email-row">
        <div class="email-row__meta">
          <div class="email-row__from"></div>
          <div class="email-row__subject"></div>
        </div>
        <button class="action-pill" type="button" hidden></button>
      </li>
    </template>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
