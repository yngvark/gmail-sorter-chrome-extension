<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Side Panel Test</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 16px;
        margin: 0;
      }
      h1 { font-size: 16px; margin: 0 0 12px; }
      .opened-at { color: #666; font-size: 12px; margin-bottom: 16px; }
      button { padding: 8px 12px; font-size: 14px; cursor: pointer; }
      #tick { margin-top: 16px; font-variant-numeric: tabular-nums; }
      #log { margin-top: 16px; font-size: 12px; color: #333; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>Side Panel Test</h1>
    <div class="opened-at">Panel opened at: <span id="opened-at"></span></div>
    <button id="click-me">Click me</button>
    <div id="tick">Tick: 0</div>
    <div id="log"></div>

    <script src="sidepanel.js"></script>
  </body>
</html>
